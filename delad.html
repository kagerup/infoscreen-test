<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>2 delar</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #eaeaea;
        font-family: Arial, sans-serif;
    }

    /* Hela arbetsytan */
    #canvas {
        width: 736px;
        height: 530px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 50% 50%;
        background: #ffffff;
    }

    /* Stora vänstra rutan (tar två rader) */
    .left {
    grid-row: ;
    background-color: #98c1d9;
    padding: 0;
    margin: 0;
    overflow: hidden;
    position: relative;
    text-align: left;       /* tvinga allt till vänster */
    object-fit: contain;    
}
    /* Övre högra rutan */
    .right {
        background-color: #e5989b; /* varm rosa */
        padding: 0px;
        box-sizing: border-box;
        object-fit: contain;
    }

    
</style>

</head>
<body>

<div id="canvas">
    
    <!-- LEFT AREA WITH IFRAME WRAPPER -->
    <div class="left">
        <div class="iframe-wrapper-allergi">
            <iframe
            src="https://kagerup.github.io/infoscreen-test/Allergi_del.html"></iframe>
       </div>
    </div>

    <div class="right">
        <div class="iframe-wrapper-meny">
            <iframe
            src="https://kagerup.github.io/infoscreen-test/DagensLunch.html"></iframe>
        </div>
    </div>

    

</div>

</body>
</html>
