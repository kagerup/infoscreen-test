<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<style>
    body {
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
        background-color: #e5989b;
        color: #000;
        box-sizing: border-box;
    }

    h1 {
        margin: 0 0 10px 0;
        font-size: 36px;
        font-weight: bold;
    }

    .row {
        display: grid;
        grid-template-columns: 35px 1fr auto;
        align-items: center;
        font-size: 22px;
        margin-bottom: 14px;
        gap: 10px;
    }

    .divider {
        width: 100%;
        height: 2px;
        background-color: #000;
        margin: 20px 0;
        opacity: 0.4;
    }

    .value {
        font-weight: bold;
    }

    /* 🔥 Endast strecket under “Hann inte” */
    .underline {
        border-bottom: 2px solid black;
        padding-bottom: 3px;
        display: inline-block;
    }

</style>
</head>
<body>

<h2>SVINN – 2026-03-23</h2>

<div class="row">
    <div>🤢</div>
    <div>Passade inte mig:</div>
    <div class="value">5.95 kg</div>
</div>

<div class="row">
    <div>🥹</div>
    <div>Tog för mycket:</div>
    <div class="value">4.6 kg</div>
</div>

<div class="row">
    <div>⏱️</div>
    <div>Hann inte:</div>

    <!-- 🔥 Här kommer det nya strecket -->
    <div class="value underline">
        2.8 kg
    </div>
</div>

<div class="row">
    <div>🟰</div>
    <div><strong>Tallriksvinn:</strong></div>
    <div class="value"><strong>13.35000000000000113.35</strong> kg</
</div>

<div class="divider"></div>

<div class="row">
    <div>🥗</div>
    <div>Serveringssvinn:</div>
    <div class="value">2.5 kg</div>
</div>

<div class="row">
    <div>👨‍🍳</div>
    <div>Kökssvinn:</div>
    <div class="value">4 kg</div>
</div>

<div class="row">
    <div>🥛</div>
    <div>Antal glas på vagnen:</div>
    <div class="value">48 st</div>
</div>

</body>
</html>
