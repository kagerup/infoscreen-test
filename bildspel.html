<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Bildspel från GitHub-mapp</title>
<style>
    body {
    margin: 0;
    background: black;
    height: 100vh;
    overflow: hidden;
}

#slideshow {
    position: relative;     /* ✅ Viktigt! Bilden placerar sig rätt */
    width: 100%;
    height: 100%;
}

#slideshow img {
    position: absolute;
    top: 50%;               /* ✅ Centrera vertikalt */
    left: 50%;              /* ✅ Centrera horisontellt */
    transform: translate(-50%, -50%); /* ✅ Perfekt centrerat */
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

#slideshow img.active {
    opacity: 1;
}
</style>
</head>
<body>

<div id="slideshow"></div>

<script>
const githubUser = "kagerup";         // ändra till ditt användarnamn
const repoName   = "infoscreen-test"; // ändra till ditt repo
const folderPath = "bildspel";          // ändra till din mapp

fetch(`https://api.github.com/repos/${githubUser}/${repoName}/contents/${folderPath}`)
    .then(res => res.json())
    .then(files => {
        const images = files
            .filter(f => f.name.match(/\.(jpg|jpeg|png|gif)$/i))
            .map(f => f.download_url);

 // ✅ Slumpa ordningen på bilderna
        images.sort(() => Math.random() - 0.5);


        const slideshow = document.getElementById("slideshow");
        images.forEach((src, i) => {
            const img = document.createElement("img");
            img.src = src;
            if (i === 0) img.classList.add("active");
            slideshow.appendChild(img);
        });

        let index = 0;
        const slides = document.querySelectorAll("#slideshow img");

        setInterval(() => {
            slides[index].classList.remove("active");
            index = (index + 1) % slides.length;
            slides[index].classList.add("active");
        }, 5000);
    });
</script>

</body>
</html>
``
