<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Layout 1181x1080</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #eaeaea;
        font-family: Arial, sans-serif;
    }

    #canvas {
        width: 1181px;
        height: 1080px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 70% 30%;
        grid-template-rows: 540px 540px;
        background: #ffffff;
    }

    /* LEFT AREA */
    .left-big {
        grid-row: 1 / 3;
        background-color: #98c1d9;
        padding: 0;
        overflow: hidden;
        position: relative;
    }

    /* Wrapper */
    .iframe-wrapper {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
    }

    /* Iframe med scaling / stretching */
    .iframe-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        border: none;

        /* Originalstorlek på sidan du bäddar in */
        width: 1920px;
        height: 1080px;

        /* Anpassa skalningen */
        transform-origin: top left;
        transform: scale(0.615); /* <-- justera vid behov */
    }

    .right-top {
        background-color: #e5989b;
        padding: 20px;
        box-sizing: border-box;
    }

    .right-bottom {
        background-color: #b5e48c;
        padding: 20px;
        box-sizing: border-box;
    }
</style>

</head>
<body>

<div id="canvas">

    <div class="left-big">
        <div class="iframe-wrapper">
            <iframe src="https://kagerup.github.io/infoscreen-test/index"></iframe>
        </div>
    </div>

    <div class="right-top">
        <h3>Gårdagens svinn</h3>
        <p>{{svinn är saker som kastas om man är trött jag tröttnar}}</p>
    </div>

    <div class="right-bottom">
        <h3>Information</h3>
        <p><!-- placeholder för framtida behov --></p>
    </div>
</div>

</body>
</html>
