<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Layout 1181x1080</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #eaeaea;
        font-family: Arial, sans-serif;
    }

    /* Hela arbetsytan */
    #canvas {
        width: 1181px;
        height: 1080px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 70% 30%;
        grid-template-rows: 540px 540px;
        background: #ffffff;
    }

    /* Stora vänstra rutan (tar två rader) */
    .left-big {
        grid-row: 1 / 3;
        background-color: #98c1d9; /* ljus blå */
        padding: 1px;
        box-sizing: border-box;
    }

    /* Övre högra rutan */
    .right-top {
        background-color: #e5989b; /* varm rosa */
        padding: 20px;
        box-sizing: border-box;
    }

    /* Nedre högra rutan */
    .right-bottom {
        background-color: #b5e48c; /* ljus grön */
        padding: 20px;
        box-sizing: border-box;
    }
</style>

</head>
<body>

<div id="canvas">
    
<div class="left-big">
    <iframe 
        src="https://kagerup.github.io/infoscreen-test/index"
        style="
        width: 100%;
        height: calc(100% - 40px);
        border: none;
        overflow: hidden;
        display: block;

        ">
    </iframe>
</div>


    <div class="right-top">
        <h3>Gårdagens svinn</h3>
        <p>{{svinn är saker som kastas om man är trött}}</p>
    </div>

    <div class="right-bottom">
        <h3>Information</h3>
        <p><!-- placeholder för framtida behov --></p>
    </div>
</div>

</body>
</html>
